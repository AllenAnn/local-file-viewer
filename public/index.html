<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档预览工具</title>
    <!-- 引入 Google Fonts (Outfit, Noto Sans SC, Playfair Display) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- 引入预览所需的开源 CDN 库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx-preview@0.1.18/dist/docx-preview.min.js"></script>

    <!-- ⚡ 引入官方 GitHub Markdown 排版基石与 Highlight.js 语法彩色高亮 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.2.0/github-markdown.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css" id="hljsLight">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css" id="hljsDark" disabled>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

    <style>
        :root {
            /* 2026 高端现代轻盈流光色彩与环境深度体系 */
            --bg-main: #f8fafc;            /* 极轻快温暖的浅灰蓝底色 */
            --sidebar-bg: #ffffff;         /* 干净纯白侧栏 */
            --sidebar-border: #e2e8f0;     /* 细腻灰边 */
            --card-bg: #ffffff;            /* 内容卡片底色 */
            --card-border: #e2e8f0;        /* 细腻边框 */
            --text-main: #0f172a;          /* 深邃青灰黑 */
            --text-muted: #64748b;         /* 清晰优雅次级灰 */
            
            /* 经典高科技感皇家蓝 */
            --brand-color: #0969da;        
            --brand-hover: #1d4ed8;
            --brand-light: rgba(9, 105, 218, 0.04); 
            --active-tint: rgba(9, 105, 218, 0.07); 
            
            --accent: #ef4444;             /* 珊瑚红 */
            --success: #10b981;            /* 翡翠绿 */
            --docx-bg: #f8fafc;            
            
            /* 2026 软性环境多重投影体系 (Soft Ambient Depth Shadows) */
            --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.04);
            --shadow-md: 0 10px 30px rgba(15, 23, 42, 0.05);
            --shadow-lg: 0 20px 48px rgba(15, 23, 42, 0.08);
            --shadow-ambient: 0 4px 20px rgba(15, 23, 42, 0.03);
            --shadow-pop: 0 16px 36px rgba(15, 23, 42, 0.12); 
            
            --radius-lg: 16px;             /* 更大更现代的圆角 */
            --radius-md: 10px;              
            --radius-sm: 6px;

            /* 2026 阻尼弹簧过渡曲线 */
            --spring-transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            --fast-transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            /* 暗色深邃星空探索风格 */
            --bg-main: #080b11;
            --sidebar-bg: #0e131f;
            --sidebar-border: #1e293b;
            --card-bg: #0e131f;
            --card-border: #1e293b;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            
            --brand-color: #38bdf8;
            --brand-hover: #0ea5e9;
            --brand-light: rgba(56, 189, 248, 0.05);
            --active-tint: rgba(56, 189, 248, 0.09);
            
            --accent: #f87171;
            --success: #34d399;
            --docx-bg: #080b11;
            
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.35);
            --shadow-lg: 0 20px 48px rgba(0, 0, 0, 0.5);
            --shadow-ambient: 0 4px 20px rgba(0, 0, 0, 0.25);
            --shadow-pop: 0 16px 36px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            -webkit-font-smoothing: antialiased;
        }

        /* 自定义极窄滚动条 (仅在滚动时显示，完全扁平化) */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(100, 116, 139, 0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 116, 139, 0.4);
        }

        /* 顶部极细微流光进度条 */
        .top-loader-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2.5px;
            background: linear-gradient(90deg, transparent, var(--brand-color), transparent);
            background-size: 200% 100%;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .top-loader-bar.loading {
            opacity: 1;
            animation: flowStream 1.5s linear infinite;
        }

        /* ==========================================================================
           📂 侧边栏 (全面增强呼吸感，增大各组件间隔)
           ========================================================================== */
        .sidebar {
            width: 330px;
            min-width: 330px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--sidebar-border);
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 10;
            transition: var(--spring-transition);
        }

        body.sidebar-collapsed .sidebar {
            margin-left: -330px;
            opacity: 0;
            pointer-events: none;
        }

        .sidebar-header {
            padding: 32px 24px 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .brand-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .logo-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 极轻量、极具细节科技感的 SVG 徽标插画 */
        .logo-svg-brand {
            stroke: var(--brand-color);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0;
        }
        .brand-section:hover .logo-svg-brand {
            transform: scale(1.1) rotate(6deg);
        }

        .logo-title h1 {
            font-size: 14.5px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 0.5px;
            font-family: 'Outfit', -apple-system, sans-serif;
            text-transform: uppercase;
        }

        .theme-toggle {
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-muted);
            width: 28px;
            height: 28px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--fast-transition);
        }

        .theme-toggle:hover {
            color: var(--text-main);
            background-color: var(--brand-light);
        }

        .theme-toggle svg {
            transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .theme-toggle:hover svg {
            transform: scale(1.1) rotate(15deg);
        }

        /* 路径选择配置 */
        .dir-config-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 4px;
        }

        .dir-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        .dir-change-btn {
            background-color: transparent;
            border: 1px solid var(--sidebar-border);
            color: var(--text-main);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            transition: var(--fast-transition);
        }

        .dir-change-btn:hover {
            background-color: var(--brand-light);
            border-color: var(--brand-color);
            color: var(--brand-color);
        }

        .dir-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .dir-input-icon {
            position: absolute;
            left: 10px;
            stroke: var(--text-muted);
            pointer-events: none;
            width: 13px;
            height: 13px;
            transition: stroke 0.2s ease;
        }

        .dir-input {
            width: 100%;
            padding: 8px 12px 8px 28px;
            border: 1px solid var(--sidebar-border);
            background-color: transparent;
            color: var(--text-main);
            border-radius: var(--radius-md);
            font-size: 11.5px;
            outline: none;
            text-overflow: ellipsis;
            cursor: text;
            font-family: 'Fira Code', monospace;
            transition: var(--fast-transition);
        }

        .dir-input:focus {
            border-color: var(--brand-color);
            background-color: var(--sidebar-bg);
            box-shadow: 0 0 0 1px var(--brand-color);
        }
        .dir-input:focus ~ .dir-input-icon {
            stroke: var(--brand-color);
        }

        /* 搜索框 */
        .search-container {
            position: relative;
            margin-top: 4px;
        }

        .search-input {
            width: 100%;
            padding: 8px 52px 8px 32px;    /* 为右侧 ⌘K 腾出空间 */
            border: 1px solid var(--sidebar-border);
            background-color: transparent;
            color: var(--text-main);
            border-radius: var(--radius-md);
            font-size: 12px;
            outline: none;
            transition: var(--fast-transition);
        }

        .search-input:focus {
            border-color: var(--brand-color);
            box-shadow: 0 0 0 1px var(--brand-color);
        }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            stroke: var(--text-muted);
            fill: none;
            width: 14px;
            height: 14px;
            transition: stroke 0.2s ease;
        }
        .search-input:focus + .search-icon {
            stroke: var(--brand-color);
        }

        /* ⌨️ 搜索框快捷键指示微章 (kbd) */
        .kbd-hint {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 9px;
            font-weight: 600;
            color: var(--text-muted);
            background-color: var(--sidebar-bg);
            border: 1px solid var(--sidebar-border);
            padding: 2.5px 5.5px;
            border-radius: 4px;
            pointer-events: auto;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            user-select: none;
            transition: var(--fast-transition);
        }
        .kbd-hint:hover {
            border-color: var(--brand-color);
            color: var(--brand-color);
            background-color: var(--brand-light);
        }

        /* 列表项的平滑微动效 - 更大气的行高与间隔，提升呼吸感 */
        .file-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px; /* 增大间距，强化呼吸感 */
        }

        .file-item {
            position: relative;
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            background-color: transparent;
            cursor: pointer;
            transition: var(--spring-transition);
            gap: 14px;
            border: 1px solid transparent;
        }

        .file-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%) scaleY(0);
            width: 3.5px;
            height: 18px;
            background-color: var(--brand-color);
            border-radius: 0 4px 4px 0;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }

        .file-item.active::before {
            transform: translateY(-50%) scaleY(1);
        }

        .file-item:hover {
            background-color: var(--brand-light);
            border-color: var(--card-border);
            transform: translateX(6px) scale(1.015); /* 带来轻微浮起与横向推开的呼吸感 */
            box-shadow: var(--shadow-sm);
        }

        .file-item.active {
            background-color: var(--active-tint);
            border-color: rgba(9, 105, 218, 0.08);
        }
        
        [data-theme="dark"] .file-item.active {
            border-color: rgba(56, 189, 248, 0.15);
        }

        .item-svg-icon {
            width: 18px;
            height: 18px;
            stroke-width: 1.8;
            stroke: var(--text-muted);
            fill: none;
            flex-shrink: 0;
            transition: var(--spring-transition);
        }

        .file-item:hover .item-svg-icon,
        .file-item.active .item-svg-icon {
            transform: scale(1.15) rotate(3deg);
        }

        .file-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .file-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            font-size: 10px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .sidebar-footer {
            padding: 20px 24px;
            border-top: 1px solid var(--sidebar-border);
        }

        .refresh-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 9px;
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--sidebar-border);
            border-radius: var(--radius-md);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--fast-transition);
        }

        .refresh-btn:hover {
            background-color: var(--brand-light);
            border-color: var(--brand-color);
            color: var(--brand-color);
        }

        .refresh-btn svg {
            width: 13px;
            height: 13px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .refresh-btn:hover svg {
            transform: rotate(360deg);
        }

        /* ==========================================================================
           🖥&nbsp;主预览区与全局悬浮折叠按钮
           ========================================================================== */
        .preview-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            position: relative;
            z-index: 2; /* 确保在极光背景层 (z-index: 1) 之上渲染，防止背景穿透文档 */
        }

        .sidebar-toggle-btn {
            position: absolute;
            left: 16px;
            top: 16px;
            z-index: 100;
            cursor: pointer;
            border: 1px solid var(--sidebar-border);
            background-color: var(--sidebar-bg);
            color: var(--text-main);
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--fast-transition);
        }

        .sidebar-toggle-btn:hover {
            background-color: var(--brand-light);
            border-color: var(--brand-color);
            color: var(--brand-color);
            transform: scale(1.05);
        }

        .sidebar-toggle-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .sidebar-toggle-btn:hover svg {
            animation: arrowWiggle 0.8s ease-in-out infinite;
        }

        body.sidebar-collapsed .sidebar-toggle-btn svg {
            transform: rotate(180deg);
        }
        body.sidebar-collapsed .sidebar-toggle-btn:hover svg {
            animation: arrowWiggleReverse 0.8s ease-in-out infinite;
        }

        /* ==========================================================================
           🎨 Empty State (2026 几何悬浮呼吸动态插画)
           ========================================================================== */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        .abstract-illustration {
            width: 180px;
            height: 140px;
            margin-bottom: 24px;
            position: relative;
        }

        .float-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .float-layer-1 {
            animation: floatSine 6s ease-in-out infinite;
        }
        .float-layer-2 {
            animation: floatSine 4s ease-in-out infinite;
            animation-delay: -1.5s;
        }
        .float-layer-3 {
            animation: floatSine 8s ease-in-out infinite;
            animation-delay: -3s;
        }

        .empty-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .empty-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            max-width: 340px;
            line-height: 1.6;
        }

        /* 顶部操作条 (从 56px 增高为 64px，拉开呼吸感) */
        .preview-header {
            padding: 18px 40px 18px 72px;
            background-color: var(--sidebar-bg);
            border-bottom: 1px solid var(--sidebar-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 5;
            height: 64px;
        }

        .current-file-details {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .current-file-title {
            font-size: 14.5px;
            font-weight: 700;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: 'Outfit', sans-serif;
        }

        .current-file-size {
            font-size: 10px;
            background-color: var(--brand-light);
            color: var(--brand-color);
            padding: 2.5px 7px;
            border-radius: var(--radius-sm);
            font-weight: 600;
        }

        .actions-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .md-theme-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
            border-right: 1px solid var(--sidebar-border);
            padding-right: 12px;
        }

        .md-theme-select {
            padding: 4px 8px;
            border: 1px solid var(--sidebar-border);
            background-color: transparent;
            color: var(--text-main);
            border-radius: var(--radius-sm);
            font-size: 11px;
            outline: none;
            cursor: pointer;
            transition: var(--fast-transition);
        }

        .md-theme-select:hover {
            border-color: var(--brand-color);
        }

        /* 扁平化圆角轻按钮 */
        .action-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 10px;
            border: none !important;
            background-color: transparent !important;
            color: var(--text-muted);
            border-radius: var(--radius-sm);
            font-size: 11.5px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: var(--fast-transition);
        }

        .action-btn:hover {
            color: var(--brand-color);
            background-color: var(--brand-light) !important;
            transform: translateY(-0.5px);
        }

        .action-btn svg {
            width: 13px;
            height: 13px;
            fill: none;
            stroke-width: 1.8;
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .action-btn:hover svg {
            transform: scale(1.08);
        }

        /* 🎨 右上角动作图标功能性彩色微渲染 */
        /* 1. 原文件打开 - 活力冷浅橙 */
        #openBtn svg {
            stroke: #ea580c !important;
        }
        [data-theme="dark"] #openBtn svg {
            stroke: #f97316 !important;
        }

        /* 2. 导出 PDF - PDF 经典红色 */
        #exportPdfBtn svg path,
        #exportPdfBtn svg rect {
            stroke: #cf222e !important;
        }
        [data-theme="dark"] #exportPdfBtn svg path,
        [data-theme="dark"] #exportPdfBtn svg rect {
            stroke: #f85149 !important;
        }

        /* 3. 下载文件 - 经典翡翠绿 */
        #downloadBtn svg {
            stroke: #1a7f37 !important;
        }
        [data-theme="dark"] #downloadBtn svg {
            stroke: #3fb950 !important;
        }

        /* ==========================================================================
           🔍 预览主体与扁平黄金版心容器 (Notion 风格全扁平重构)
           ========================================================================== */
        .preview-body {
            flex: 1;
            overflow: auto;
            position: relative;
            background-color: var(--bg-main);
            padding: 36px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* 骨架流光加载蒙层 */
        .loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .loader-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 现代流光骨架屏 (Skeleton screen) */
        .skeleton-shimmer-container {
            width: 100%;
            max-width: 820px;
            padding: 60px 52px;
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin: 16px auto 36px auto;
        }

        .skeleton-block {
            height: 18px;
            background: linear-gradient(90deg, var(--bg-main) 25%, var(--sidebar-border) 37%, var(--bg-main) 63%);
            background-size: 400% 100%;
            animation: skeletonLoading 1.4s ease infinite;
            border-radius: var(--radius-sm);
        }

        .skeleton-title {
            width: 40%;
            height: 28px;
            margin-bottom: 8px;
        }

        .skeleton-text-1 { width: 90%; }
        .skeleton-text-2 { width: 100%; }
        .skeleton-text-3 { width: 75%; }

        /* 主预览卡片 (精致扁平纸质圆角卡片，引入极度呼吸感间距) */
        .renderer-container {
            width: 100%;
            max-width: 820px;
            background-color: var(--card-bg);
            border: 1px solid var(--card-border) !important;
            border-radius: var(--radius-lg) !important;
            box-shadow: var(--shadow-md) !important;
            padding: 60px 52px;
            min-height: 100%;
            margin: 16px auto 36px auto;
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            overflow-x: hidden;
            transition: max-width 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* 强力全宽模式 */
        .renderer-container.full-width-mode {
            max-width: 100% !important;
            padding: 48px 60px;
            margin: 0;
            border-radius: 0 !important;
            border: none !important;
        }

        /* 针对小屏幕设备进行内边距自适应折叠 */
        @media (max-width: 768px) {
            .renderer-container {
                padding: 24px 16px;
                margin: 0;
            }
        }

        /* ⚡ 全局统一 Markdown 代码与代码块排版优化 (防止自动折行乱作一团) */
        .markdown-body pre {
            background-color: var(--brand-light) !important;
            border: 1px solid var(--sidebar-border) !important;
            padding: 16px !important;
            border-radius: var(--radius-md) !important;
            white-space: pre !important;
            word-wrap: normal !important;
            overflow-x: auto !important;
            position: relative;
        }

        .markdown-body code {
            font-family: 'Fira Code', ui-monospace, SFMono-Regular, Consolas, monospace !important;
            font-size: 13.5px !important;
            background-color: var(--brand-light) !important;
            color: var(--text-main) !important;
            padding: 2px 5px !important;
            border-radius: 4px !important;
        }

        .markdown-body pre code {
            padding: 0 !important;
            background-color: transparent !important;
            color: inherit !important;
            border-radius: 0 !important;
        }

        /* 📋 代码一键复制按钮样式 (Notion 级精细绝对定位，安全 !important 锁定) */
        .code-copy-btn {
            position: absolute !important;
            top: 10px !important;
            right: 10px !important;
            z-index: 100 !important;
            background-color: var(--sidebar-bg) !important;
            border: 1px solid var(--sidebar-border) !important;
            color: var(--text-muted) !important;
            width: 28px !important;
            height: 28px !important;
            padding: 0 !important;
            margin: 0 !important;
            border-radius: var(--radius-sm) !important;
            cursor: pointer !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            opacity: 0 !important;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1) !important;
            box-shadow: none !important;
        }

        pre:hover .code-copy-btn {
            opacity: 1 !important;
        }

        .code-copy-btn:hover {
            color: var(--brand-color) !important;
            border-color: var(--brand-color) !important;
            background-color: var(--brand-light) !important;
            transform: scale(1.05) !important;
        }

        @media print {
            .code-copy-btn {
                display: none !important;
            }
        }

        /* Markdown 中的图片支持灯箱手势，变焦光标 */
        .markdown-body img {
            cursor: zoom-in;
            transition: transform 0.2s ease;
        }
        .markdown-body img:hover {
            transform: scale(1.01);
        }

        /* ==========================================================================
           🔔 Toast 提示
           ========================================================================== */
        .toast-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 9999;
            pointer-events: none;
        }

        .toast-item {
            padding: 8px 16px;
            border-radius: var(--radius-md);
            background: var(--sidebar-bg);
            border: 1px solid var(--sidebar-border);
            box-shadow: var(--shadow-pop);
            color: var(--text-main);
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transform: translateY(-10px);
            opacity: 0;
            animation: toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            pointer-events: auto;
        }

        .toast-item svg {
            width: 14px;
            height: 14px;
            stroke-width: 2;
            fill: none;
        }

        .toast-item.success svg { stroke: var(--success); }
        .toast-item.error svg { stroke: var(--accent); }
        .toast-item.info svg { stroke: var(--brand-color); }

        .toast-item.fade-out {
            animation: toastOut 0.2s ease forwards;
        }

        /* ==========================================================================
           🎨 自定义主题色选择器面板样式
           ========================================================================== */
        .brand-color-picker-container {
            position: relative;
            display: inline-block;
            margin-right: 8px;
        }

        .color-palette-popover {
            position: absolute;
            top: 36px;
            right: 0;
            background-color: var(--sidebar-bg);
            border: 1px solid var(--sidebar-border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-pop);
            padding: 16px;
            z-index: 1000;
            width: 220px; /* 宽度调宽 */
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: fadeIn 0.18s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .palette-title {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 2px;
            text-align: left;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .palette-presets {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
        }

        .preset-color {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(0, 0, 0, 0.08);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .preset-color:hover {
            transform: scale(1.2);
        }

        .palette-divider {
            height: 1px;
            background-color: var(--sidebar-border);
            margin: 4px 0;
        }

        .palette-custom-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11.5px;
            color: var(--text-muted);
        }

        #customColorPicker {
            border: none;
            background: none;
            width: 28px;
            height: 20px;
            cursor: pointer;
            outline: none;
            padding: 0;
        }

        /* 工作区背景模式选择 */
        .bg-mode-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }
        
        .bg-mode-btn {
            padding: 6px 2px;
            background-color: var(--sidebar-bg);
            border: 1px solid var(--sidebar-border);
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--fast-transition);
            text-align: center;
        }
        
        .bg-mode-btn:hover {
            color: var(--brand-color);
            border-color: var(--brand-color);
            background-color: var(--brand-light);
        }
        
        .bg-mode-btn.active {
            color: #ffffff !important;
            background-color: var(--brand-color) !important;
            border-color: var(--brand-color) !important;
        }
        
        [data-theme="dark"] .bg-mode-btn.active {
            color: #080b11 !important;
            background-color: var(--brand-color) !important;
        }

        /* 极光背景层 */
        .aurora-bg-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1; /* 在大底和侧栏/工作区之间 */
            overflow: hidden;
            pointer-events: none;
        }
        
        [data-bg-mode="aurora"] .aurora-bg-container {
            display: block;
        }
        
        .aurora-blob {
            position: absolute;
            width: 50vw;
            height: 50vw;
            min-width: 500px;
            min-height: 500px;
            border-radius: 50%;
            filter: blur(180px); /* 提升模糊度，使渐变更加平滑自然 */
            opacity: 0.10;       /* 降低不透明度，打造极致微光质感 */
            mix-blend-mode: multiply;
            animation: floatBlob 25s ease infinite alternate;
        }
        
        [data-theme="dark"] .aurora-blob {
            opacity: 0.05;       /* 暗色模式下更柔和 */
            mix-blend-mode: screen;
        }
        
        .blob-1 {
            background-color: #818cf8; /* 雅致靛蓝 */
            top: -10%;
            left: -10%;
            animation-duration: 22s;
        }
        
        .blob-2 {
            background-color: #c084fc; /* 梦幻紫罗兰 */
            bottom: -20%;
            right: -10%;
            animation-delay: -5s;
            animation-duration: 32s;
        }
        
        .blob-3 {
            background-color: #f472b6; /* 珊瑚玫瑰粉 */
            top: 30%;
            left: 40%;
            animation-delay: -10s;
            animation-duration: 26s;
        }
        
        @keyframes floatBlob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(60px, -80px) scale(1.15); }
            66% { transform: translate(-80px, 40px) scale(0.95); }
            100% { transform: translate(0px, 0px) scale(1); }
        }

        /* 不同背景模式下的微调 */
        body {
            position: relative;
            z-index: 2;
        }
        
        /* 1. 网格背景模式 */
        [data-bg-mode="grid"] body {
            background-image: radial-gradient(var(--sidebar-border) 1.2px, transparent 1.2px) !important;
            background-size: 24px 24px !important;
        }
        
        /* 2. 纸香纸暖背景模式 */
        [data-bg-mode="warm"] body {
            background-color: #f5edd8 !important;
        }
        [data-theme="dark"][data-bg-mode="warm"] body {
            background-color: #171310 !important;
        }
        
        /* 当非极简纯色模式时，让主工作区和内容区域变透明以透露出底层背景，但保留文档卡片 (.renderer-container) 自身的实体背景 */
        [data-bg-mode="aurora"] .preview-area,
        [data-bg-mode="aurora"] .preview-body,
        [data-bg-mode="grid"] .preview-area,
        [data-bg-mode="grid"] .preview-body,
        [data-bg-mode="warm"] .preview-area,
        [data-bg-mode="warm"] .preview-body {
            background-color: transparent !important;
        }

        /* 扁平滑动双态控制器 (Segmented Switch) */
        .layout-toggle-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background-color: var(--brand-light);
            border: 1px solid var(--sidebar-border);
            padding: 2px;
            border-radius: 20px;
            width: 100px;
            height: 28px;
            cursor: pointer;
            user-select: none;
            margin-right: 8px;
            transition: var(--fast-transition);
        }

        .layout-toggle-wrapper:hover {
            border-color: var(--brand-color);
        }
        
        .layout-slider {
            position: absolute;
            left: 2px;
            top: 2px;
            width: 46px;
            height: 22px;
            background-color: var(--sidebar-bg);
            border: 1px solid var(--sidebar-border);
            border-radius: 18px;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        .layout-toggle-wrapper.full-mode .layout-slider {
            transform: translateX(48px);
        }
        
        .layout-option {
            position: relative;
            z-index: 2;
            flex: 1;
            text-align: center;
            font-size: 10px;
            font-weight: 500;
            color: var(--text-muted);
            transition: color 0.2s ease, font-weight 0.2s ease;
            line-height: 22px;
        }
        
        .layout-option.active {
            color: var(--text-main);
            font-weight: 600;
        }

        /* ==========================================================================
           ⌨️ Command Palette ⌘K 快捷命令行面板样式
           ========================================================================== */
        .cmd-palette-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 10000;
            display: none; /* 默认完全隐藏，防止初始重绘闪烁 */
            justify-content: center;
            padding-top: 15vh;
        }

        .cmd-palette-backdrop.active {
            display: flex; /* 激活时展示 */
        }

        .cmd-palette-container {
            width: 100%;
            max-width: 550px;
            height: fit-content;
            background-color: var(--sidebar-bg);
            border: 1px solid var(--sidebar-border);
            border-radius: 12px;
            box-shadow: var(--shadow-pop);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .cmd-palette-search-wrapper {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid var(--sidebar-border);
            gap: 12px;
            position: relative;
        }

        .cmd-search-icon {
            stroke: var(--text-muted);
            fill: none;
            stroke-width: 2;
            width: 15px;
            height: 15px;
        }

        .cmd-palette-input {
            flex: 1;
            border: none;
            background: none;
            outline: none;
            color: var(--text-main);
            font-size: 13.5px;
            font-weight: 500;
        }

        .cmd-esc-hint {
            font-size: 9px;
            font-weight: 600;
            color: var(--text-muted);
            border: 1px solid var(--sidebar-border);
            padding: 2.5px 5.5px;
            border-radius: 4px;
            font-family: 'Outfit', sans-serif;
        }

        .cmd-palette-list {
            overflow-y: auto;
            max-height: 280px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .cmd-palette-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 9px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--fast-transition);
        }

        .cmd-palette-item.active-cmd {
            background-color: var(--brand-light);
        }

        .cmd-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12.5px;
            font-weight: 500;
            color: var(--text-main);
        }

        .cmd-item-icon {
            font-size: 14px;
            opacity: 0.85;
            display: flex;
            align-items: center;
        }

        .cmd-item-shortcut {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 500;
            background-color: var(--brand-light);
            border: 1px solid var(--sidebar-border);
            padding: 1px 4px;
            border-radius: 3px;
            font-family: 'Outfit', sans-serif;
        }

        /* ==========================================================================
           💡 毛玻璃超清图片灯箱样式
           ========================================================================== */
        .lightbox-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 10001;
            display: none; /* 默认关闭 */
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
            opacity: 0;
        }

        .lightbox-backdrop.active {
            display: flex; /* 激活时展示 */
            animation: fadeIn 0.25s ease forwards;
        }

        .lightbox-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .lightbox-backdrop.active .lightbox-img {
            transform: scale(1);
        }

        /* ==========================================================================
           🎬 动画和过度
           ========================================================================== */
        @keyframes flowStream {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }

        @keyframes pulseRing {
            0% { transform: scale(0.9); opacity: 0.8; }
            70% { transform: scale(2.2); opacity: 0; }
            100% { transform: scale(0.9); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastIn {
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes toastOut {
            to { transform: translateY(-16px); opacity: 0; }
        }

        @keyframes arrowWiggle {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-3px); }
        }
        @keyframes arrowWiggleReverse {
            0%, 100% { transform: rotate(180deg) translateX(0); }
            50% { transform: rotate(180deg) translateX(-3px); }
        }

        @keyframes skeletonLoading {
            0% { background-position: 100% 50%; }
            100% { background-position: 0 50%; }
        }

        @keyframes floatSine {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(1.5deg); }
        }

        /* ==========================================================================
           📊 Excel & CSV 表格极佳美化样式
           ========================================================================== */
        .excel-viewer {
            display: flex;
            flex-direction: column;
            padding: 32px !important;
            gap: 18px;
            background-color: var(--card-bg) !important;
            border: 1px solid var(--card-border) !important;
            border-radius: var(--radius-lg) !important;
            width: 100% !important;
            max-width: 100% !important;
            box-shadow: var(--shadow-md) !important;
            transition: var(--spring-transition);
        }
        .excel-tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 12px;
            margin-bottom: 4px;
            overflow-x: auto;
        }
        .excel-tab {
            padding: 8px 18px;
            background-color: var(--sidebar-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--fast-transition);
            white-space: nowrap;
            box-shadow: var(--shadow-sm);
        }
        .excel-tab:hover {
            color: var(--brand-color);
            border-color: var(--brand-color);
            background-color: var(--brand-light);
            transform: translateY(-1px);
        }
        .excel-tab.active {
            color: #ffffff !important;
            background-color: var(--brand-color) !important;
            border-color: var(--brand-color) !important;
            box-shadow: 0 4px 12px rgba(9, 105, 218, 0.25);
        }
        [data-theme="dark"] .excel-tab.active {
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.25);
            color: #080b11 !important;
            background-color: var(--brand-color) !important;
        }
        .excel-table-wrapper {
            overflow: auto;
            width: 100%;
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            background-color: var(--card-bg);
            box-shadow: var(--shadow-sm);
            max-height: calc(100vh - 250px);
        }
        .excel-table-wrapper table {
            border-collapse: collapse;
            width: 100%;
            min-width: 900px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 13px;
            color: var(--text-main);
        }
        .excel-table-wrapper td {
            border: 1px solid var(--card-border);
            padding: 10px 14px;
            white-space: nowrap;
            transition: background-color 0.2s ease;
        }
        /* 第一行自动转为表头样式 */
        .excel-table-wrapper tr:first-child td {
            background-color: var(--brand-light);
            color: var(--brand-color);
            font-weight: 700;
            text-align: center;
            border-bottom: 2px solid var(--card-border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .excel-table-wrapper tr:not(:first-child):nth-child(even) {
            background-color: rgba(9, 105, 218, 0.015);
        }
        [data-theme="dark"] .excel-table-wrapper tr:not(:first-child):nth-child(even) {
            background-color: rgba(56, 189, 248, 0.015);
        }
        .excel-table-wrapper tr:not(:first-child):hover {
            background-color: var(--brand-light);
        }
        .excel-table-wrapper td:hover {
            background-color: rgba(9, 105, 218, 0.08) !important;
        }
        [data-theme="dark"] .excel-table-wrapper td:hover {
            background-color: rgba(56, 189, 248, 0.12) !important;
        }

        /* ==========================================================================
           📝 Word (Docx) 预览极致美化与明暗护眼适配
           ========================================================================== */
        .docx-preview-container {
            padding: 0 !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100% !important;
            background-color: transparent !important;
        }
        .docx-preview-container section.docx {
            box-sizing: border-box !important;
            width: 100% !important;
            max-width: 820px !important;
            padding: 60px 80px !important;
            margin-bottom: 24px !important;
            background-color: var(--card-bg) !important;
            color: var(--text-main) !important;
            border: 1px solid var(--card-border) !important;
            border-radius: var(--radius-lg) !important;
            box-shadow: var(--shadow-md) !important;
            transition: var(--spring-transition) !important;
        }
        /* 响应式自适应 */
        @media (max-width: 768px) {
            .docx-preview-container section.docx {
                padding: 30px 24px !important;
                border-radius: 0 !important;
                border-left: none !important;
                border-right: none !important;
            }
        }
        /* 夜间护眼模式深色反转逻辑 */
        [data-theme="dark"] .docx-preview-container section.docx {
            background-color: var(--card-bg) !important;
            color: var(--text-main) !important;
            border-color: var(--card-border) !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4) !important;
        }
        [data-theme="dark"] .docx-preview-container section.docx p,
        [data-theme="dark"] .docx-preview-container section.docx span,
        [data-theme="dark"] .docx-preview-container section.docx h1,
        [data-theme="dark"] .docx-preview-container section.docx h2,
        [data-theme="dark"] .docx-preview-container section.docx h3,
        [data-theme="dark"] .docx-preview-container section.docx h4,
        [data-theme="dark"] .docx-preview-container section.docx h5,
        [data-theme="dark"] .docx-preview-container section.docx h6,
        [data-theme="dark"] .docx-preview-container section.docx li {
            color: var(--text-main) !important;
        }
        [data-theme="dark"] .docx-preview-container section.docx * {
            border-color: var(--card-border) !important;
        }
        [data-theme="dark"] .docx-preview-container section.docx table {
            border-color: var(--card-border) !important;
        }
        [data-theme="dark"] .docx-preview-container section.docx td {
            border-color: var(--card-border) !important;
            background-color: rgba(255, 255, 255, 0.02) !important;
        }

        /* ==========================================================================
           🎨 Markdown 风格主题切换定制 (修复切换失效与不美观)
           ========================================================================== */
        /* 主题框架过渡与字体 */
        .markdown-body {
            transition: background-color 0.35s ease, color 0.35s ease, border-color 0.35s ease !important;
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif !important;
            background-color: transparent !important; /* 让外层卡片容器背景生效 */
        }
        #mdContainerOuter {
            transition: background-color 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
            box-shadow: var(--shadow-md);
        }

        /* 主题 1: GitHub 经典风格 (适配系统明暗模式) */
        [data-theme="light"] #mdContainerOuter[data-md-theme="github"] {
            background-color: #ffffff !important;
            border-color: #e2e8f0 !important;
        }
        [data-theme="light"] .markdown-body[data-md-theme="github"] {
            color: #0f172a !important;
        }
        [data-theme="dark"] #mdContainerOuter[data-md-theme="github"] {
            background-color: #0d1117 !important;
            border-color: #30363d !important;
        }
        [data-theme="dark"] .markdown-body[data-md-theme="github"] {
            color: #c9d1d9 !important;
        }
        [data-theme="dark"] .markdown-body[data-md-theme="github"] h1,
        [data-theme="dark"] .markdown-body[data-md-theme="github"] h2,
        [data-theme="dark"] .markdown-body[data-md-theme="github"] h3,
        [data-theme="dark"] .markdown-body[data-md-theme="github"] h4,
        [data-theme="dark"] .markdown-body[data-md-theme="github"] h5,
        [data-theme="dark"] .markdown-body[data-md-theme="github"] h6 {
            color: #f0f6fc !important;
            border-bottom-color: #21262d !important;
        }
        [data-theme="dark"] .markdown-body[data-md-theme="github"] code {
            background-color: rgba(110, 118, 129, 0.4) !important;
            color: #c9d1d9 !important;
        }
        [data-theme="dark"] .markdown-body[data-md-theme="github"] pre {
            background-color: #161b22 !important;
            border-color: #30363d !important;
        }
        [data-theme="dark"] .markdown-body[data-md-theme="github"] blockquote {
            color: #8b949e !important;
            border-left-color: #30363d !important;
        }
        [data-theme="dark"] .markdown-body[data-md-theme="github"] hr {
            background-color: #30363d !important;
        }
        [data-theme="dark"] .markdown-body[data-md-theme="github"] table td,
        [data-theme="dark"] .markdown-body[data-md-theme="github"] table th {
            border-color: #30363d !important;
        }
        [data-theme="dark"] .markdown-body[data-md-theme="github"] table tr {
            background-color: #0d1117 !important;
            border-top-color: #30363d !important;
        }
        [data-theme="dark"] .markdown-body[data-md-theme="github"] table tr:nth-child(2n) {
            background-color: #161b22 !important;
        }

        /* 主题 2: 极光冰蓝 (Aurora / Modern Blue) */
        #mdContainerOuter[data-md-theme="aurora"] {
            background: linear-gradient(135deg, #f0f6fc 0%, #e6f0fa 100%) !important;
            border-color: #cbdcf0 !important;
        }
        [data-theme="dark"] #mdContainerOuter[data-md-theme="aurora"] {
            background: linear-gradient(135deg, #0b1329 0%, #112240 100%) !important;
            border-color: #1e3a63 !important;
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.08) !important;
        }
        .markdown-body[data-md-theme="aurora"] {
            color: #1e293b !important;
            font-family: 'Outfit', 'Noto Sans SC', sans-serif !important;
        }
        [data-theme="dark"] .markdown-body[data-md-theme="aurora"] {
            color: #cbd5e1 !important;
        }
        .markdown-body[data-md-theme="aurora"] h1,
        .markdown-body[data-md-theme="aurora"] h2,
        .markdown-body[data-md-theme="aurora"] h3 {
            color: #032b69 !important;
            border-bottom: 2px solid #b6d3f2 !important;
        }
        [data-theme="dark"] .markdown-body[data-md-theme="aurora"] h1,
        [data-theme="dark"] .markdown-body[data-md-theme="aurora"] h2,
        [data-theme="dark"] .markdown-body[data-md-theme="aurora"] h3 {
            color: #38bdf8 !important;
            border-bottom: 2px solid #1e3bb3 !important;
        }
        .markdown-body[data-md-theme="aurora"] a {
            color: #0969da !important;
            font-weight: 600;
        }
        [data-theme="dark"] .markdown-body[data-md-theme="aurora"] a {
            color: #38bdf8 !important;
        }
        .markdown-body[data-md-theme="aurora"] code {
            background-color: rgba(9, 105, 218, 0.08) !important;
            color: #0969da !important;
        }
        [data-theme="dark"] .markdown-body[data-md-theme="aurora"] code {
            background-color: rgba(56, 189, 248, 0.12) !important;
            color: #38bdf8 !important;
        }
        .markdown-body[data-md-theme="aurora"] pre {
            background-color: rgba(9, 105, 218, 0.04) !important;
            border-color: #cbdcf0 !important;
        }
        [data-theme="dark"] .markdown-body[data-md-theme="aurora"] pre {
            background-color: #070d19 !important;
            border-color: #1e3a63 !important;
        }
        .markdown-body[data-md-theme="aurora"] blockquote {
            color: #334155 !important;
            border-left-color: #38bdf8 !important;
            background-color: rgba(56, 189, 248, 0.05) !important;
        }
        [data-theme="dark"] .markdown-body[data-md-theme="aurora"] blockquote {
            color: #94a3b8 !important;
            border-left-color: #38bdf8 !important;
            background-color: rgba(56, 189, 248, 0.02) !important;
        }

        /* 主题 3: 墨香纸暖 (Warm Paper) */
        #mdContainerOuter[data-md-theme="warm"] {
            background-color: #faf3e8 !important;
            border-color: #e3d2bd !important;
            box-shadow: 0 10px 30px rgba(139, 92, 26, 0.06) !important;
        }
        [data-theme="dark"] #mdContainerOuter[data-md-theme="warm"] {
            background-color: #201a15 !important;
            border-color: #3e3226 !important;
        }
        .markdown-body[data-md-theme="warm"] {
            color: #443725 !important;
            font-family: 'Playfair Display', 'Noto Sans SC', Georgia, serif !important;
        }
        [data-theme="dark"] .markdown-body[data-md-theme="warm"] {
            color: #d1c2b0 !important;
        }
        .markdown-body[data-md-theme="warm"] h1,
        .markdown-body[data-md-theme="warm"] h2,
        .markdown-body[data-md-theme="warm"] h3 {
            color: #2c2013 !important;
            border-bottom: 1px dashed #dcbca1 !important;
        }
        [data-theme="dark"] .markdown-body[data-md-theme="warm"] h1,
        [data-theme="dark"] .markdown-body[data-md-theme="warm"] h2,
        [data-theme="dark"] .markdown-body[data-md-theme="warm"] h3 {
            color: #e9decb !important;
            border-bottom: 1px dashed #3e3226 !important;
        }
        .markdown-body[data-md-theme="warm"] a {
            color: #b45309 !important;
            text-decoration: underline;
        }
        [data-theme="dark"] .markdown-body[data-md-theme="warm"] a {
            color: #f59e0b !important;
        }
        .markdown-body[data-md-theme="warm"] code {
            background-color: #f1e4d0 !important;
            color: #854d0e !important;
        }
        [data-theme="dark"] .markdown-body[data-md-theme="warm"] code {
            background-color: #2d241d !important;
            color: #f59e0b !important;
        }
        .markdown-body[data-md-theme="warm"] pre {
            background-color: #f3e6d2 !important;
            border-color: #e0cca9 !important;
        }
        [data-theme="dark"] .markdown-body[data-md-theme="warm"] pre {
            background-color: #171310 !important;
            border-color: #3e3226 !important;
        }
        .markdown-body[data-md-theme="warm"] blockquote {
            color: #78350f !important;
            border-left-color: #d97706 !important;
            background-color: #fdf6e2 !important;
        }
        [data-theme="dark"] .markdown-body[data-md-theme="warm"] blockquote {
            color: #b45309 !important;
            border-left-color: #b45309 !important;
            background-color: #2d241d !important;
        }

        /* 主题 4: 赛博暗夜 (Cyber Dark) */
        #mdContainerOuter[data-md-theme="cyber"] {
            background-color: #0b0d13 !important;
            border-color: #ff007f !important;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.18) !important;
        }
        .markdown-body[data-md-theme="cyber"] {
            color: #00ffcc !important;
            font-family: 'Fira Code', 'Noto Sans SC', monospace !important;
        }
        .markdown-body[data-md-theme="cyber"] h1,
        .markdown-body[data-md-theme="cyber"] h2,
        .markdown-body[data-md-theme="cyber"] h3 {
            color: #ff007f !important;
            text-shadow: 0 0 8px rgba(255, 0, 127, 0.6);
            border-bottom: 1px solid #ff007f !important;
        }
        .markdown-body[data-md-theme="cyber"] a {
            color: #ffff00 !important;
            text-shadow: 0 0 5px rgba(255, 255, 0, 0.6);
            text-decoration: underline;
        }
        .markdown-body[data-md-theme="cyber"] code {
            background-color: #131722 !important;
            color: #ff007f !important;
            border: 1px solid rgba(255, 0, 127, 0.4) !important;
        }
        .markdown-body[data-md-theme="cyber"] pre {
            background-color: #07090e !important;
            border-color: #00ffcc !important;
            box-shadow: 0 0 12px rgba(0, 255, 204, 0.1) !important;
        }
        .markdown-body[data-md-theme="cyber"] blockquote {
            color: #00ffcc !important;
            border-left-color: #ff007f !important;
            background-color: rgba(255, 0, 127, 0.06) !important;
        }
        .markdown-body[data-md-theme="cyber"] hr {
            background-color: #ff007f !important;
        }
        .markdown-body[data-md-theme="cyber"] table td,
        .markdown-body[data-md-theme="cyber"] table th {
            border-color: rgba(0, 255, 204, 0.3) !important;
        }
        .markdown-body[data-md-theme="cyber"] table tr {
            background-color: #0c0e15 !important;
            border-top-color: rgba(0, 255, 204, 0.3) !important;
        }

        /* ==========================================================================
           🎨 侧边栏与顶栏与背景模式的完美融合适配
           ========================================================================== */
        
        /* 1. 极光模式下：侧边栏与顶栏毛玻璃透光处理 */
        [data-bg-mode="aurora"] .sidebar {
            background-color: rgba(255, 255, 255, 0.7) !important;
            backdrop-filter: blur(24px) saturate(120%);
            -webkit-backdrop-filter: blur(24px) saturate(120%);
            border-right-color: rgba(226, 232, 240, 0.5) !important;
        }
        [data-theme="dark"][data-bg-mode="aurora"] .sidebar {
            background-color: rgba(14, 19, 31, 0.7) !important;
            border-right-color: rgba(30, 41, 59, 0.5) !important;
        }
        
        [data-bg-mode="aurora"] .preview-header {
            background-color: rgba(255, 255, 255, 0.7) !important;
            backdrop-filter: blur(24px) saturate(120%);
            -webkit-backdrop-filter: blur(24px) saturate(120%);
            border-bottom-color: rgba(226, 232, 240, 0.5) !important;
        }
        [data-theme="dark"][data-bg-mode="aurora"] .preview-header {
            background-color: rgba(14, 19, 31, 0.7) !important;
            border-bottom-color: rgba(30, 41, 59, 0.5) !important;
        }
        
        /* 2. 纸暖模式下：侧边栏与顶栏暖皮纸色适配 */
        [data-bg-mode="warm"] .sidebar {
            background-color: #faf3e8 !important;
            border-right-color: #e3d2bd !important;
        }
        [data-theme="dark"][data-bg-mode="warm"] .sidebar {
            background-color: #201a15 !important;
            border-right-color: #3e3226 !important;
        }
        
        [data-bg-mode="warm"] .preview-header {
            background-color: #faf3e8 !important;
            border-bottom-color: #e3d2bd !important;
        }
        [data-theme="dark"][data-bg-mode="warm"] .preview-header {
            background-color: #201a15 !important;
            border-bottom-color: #3e3226 !important;
        }
        [data-bg-mode="warm"] .sidebar-header,
        [data-bg-mode="warm"] .sidebar-footer {
            border-color: #e3d2bd !important;
        }
        [data-theme="dark"][data-bg-mode="warm"] .sidebar-header,
        [data-theme="dark"][data-bg-mode="warm"] .sidebar-footer {
            border-color: #3e3226 !important;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- 极光背景层 -->
    <div id="auroraBgContainer" class="aurora-bg-container">
        <div class="aurora-blob blob-1"></div>
        <div class="aurora-blob blob-2"></div>
        <div class="aurora-blob blob-3"></div>
    </div>

    <!-- 顶部极细流光进度条 -->
    <div id="topLoaderBar" class="top-loader-bar"></div>

    <!-- 顶层 Toast 控制器 -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand-section">
                <div class="logo-title">
                    <!-- 科技老虎头品牌 Logo -->
                    <img class="logo-svg-brand" src="logo.jpg" alt="Logo" width="30" height="30" style="border-radius: 6px; object-fit: cover;">
                    <h1>文档预览</h1>
                </div>
                <button class="theme-toggle" id="themeToggleBtn" title="切换模式">
                    <!-- 太阳图标 (SVG 精细优化) -->
                    <svg id="sunIcon" class="hidden" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <!-- 月亮图标 -->
                    <svg id="moonIcon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>

            <!-- 本地路径选择器 -->
            <div class="dir-config-container">
                <div class="dir-title-row">
                    <span>监测路径 (支持直接输入/回车保存)</span>
                    <button class="dir-change-btn" id="dirChangeBtn">更换</button>
                </div>
                <div class="dir-input-wrapper">
                    <svg class="dir-input-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <input type="text" class="dir-input" id="dirInput" placeholder="输入监测文件夹绝对路径...">
                </div>
            </div>
            
            <!-- 搜索框 -->
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索文档或按 ⌘K 执行命令...">
                <svg class="search-icon" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <div class="kbd-hint" id="cmdPaletteOpenHint" title="打开快捷命令面板">⌘K</div>
            </div>
        </div>

        <!-- 文件列表 -->
        <div class="file-list-container" id="fileList">
            <!-- 动态生成 -->
        </div>

        <div class="sidebar-footer">
            <button class="refresh-btn" id="refreshBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M23 4v6h-6"></path>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
                刷新文件列表
            </button>
        </div>
    </aside>

    <!-- 主展示区 -->
    <main class="preview-area">
        
        <!-- 全局绝对定位悬浮折叠侧栏按钮 -->
        <button class="sidebar-toggle-btn" id="sidebarToggleBtn" title="折叠/展开侧栏">
            <svg viewBox="0 0 24 24">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>

        <!-- 预览头部 -->
        <div class="preview-header" id="previewHeader">
            <div class="current-file-details">
                <div class="current-file-title" id="currentFileName">本地文档预览工具</div>
                <div class="current-file-size" id="currentFileSize" style="display: none;">-</div>
            </div>
            
            <div class="actions-group">
                <!-- 布局宽度模式减省控制 (Segmented Control) -->
                <div class="layout-toggle-wrapper" id="layoutToggleWrapper" title="切换宽屏撑满/居中版心">
                    <div class="layout-slider" id="layoutSlider"></div>
                    <div class="layout-option" id="layoutOptStandard" data-val="standard">居中</div>
                    <div class="layout-option" id="layoutOptFull" data-val="full">全宽</div>
                </div>

                <!-- 自定义主题色选择器 -->
                <div class="brand-color-picker-container" id="brandColorPickerContainer">
                    <button class="action-btn" id="colorPickerBtn" title="自定义网页主题高亮色">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 14.7255 3.09032 17.1962 4.85857 19C4.85857 19 4.5 20 4 20.5C3.5 21 3 21 3 21C5 22 7.5 22 8.5 21.5C9.5 21 9.5 20 10 19.5C10.5 19 11.5 19.5 12 19.5C12 19.5 12 22 12 22Z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
                            <circle cx="7.5" cy="10.5" r="1.5" fill="#cf222e"></circle>
                            <circle cx="11.5" cy="7.5" r="1.5" fill="#d97706"></circle>
                            <circle cx="16.5" cy="9.5" r="1.5" fill="#0969da"></circle>
                            <circle cx="15.5" cy="14.5" r="1.5" fill="#1a7f37"></circle>
                        </svg>
                        <span>主题色</span>
                    </button>
                    <div class="color-palette-popover hidden" id="colorPalettePopover">
                        <div class="palette-title">主题高亮色</div>
                        <div class="palette-presets">
                            <span class="preset-color" style="background-color: #0969da;" data-color="#0969da" title="冷海蓝"></span>
                            <span class="preset-color" style="background-color: #1a7f37;" data-color="#1a7f37" title="翡翠绿"></span>
                            <span class="preset-color" style="background-color: #d97706;" data-color="#d97706" title="活力橙"></span>
                            <span class="preset-color" style="background-color: #cf222e;" data-color="#cf222e" title="珊瑚红"></span>
                            <span class="preset-color" style="background-color: #8b5cf6;" data-color="#8b5cf6" title="靛蓝紫"></span>
                            <span class="preset-color" style="background-color: #24292f;" data-color="#24292f" title="极客黑"></span>
                        </div>
                        <div class="palette-custom-row">
                            <span>自由取色：</span>
                            <input type="color" id="customColorPicker" value="#0969da">
                        </div>
                        
                        <div class="palette-divider"></div>
                        
                        <div class="palette-title">工作区背景</div>
                        <div class="bg-mode-row" id="bgModeRow">
                            <button class="bg-mode-btn active" data-bg="solid">极简</button>
                            <button class="bg-mode-btn" data-bg="aurora">极光</button>
                            <button class="bg-mode-btn" data-bg="grid">网格</button>

                <div class="md-theme-selector hidden" id="mdThemeSelector">

                <a href="#" class="action-btn hidden" id="openBtn" target="_blank">
                    <svg viewBox="0 0 24 24">

                <button class="action-btn hidden" id="exportPdfBtn" title="将当前预览的文档保存/打印为 PDF">
                    <svg viewBox="0 0 24 24">
                        <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"></path>
                        <rect x="6" y="14" width="12" height="8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"></rect>
                    </svg>
                    导出 PDF

                    <svg viewBox="0 0 24 24">

                        <line x1="12" y1="15" x2="12" y2="3"></line>

        </div>

        <!-- 空白状态 -->
        <div class="empty-state" id="emptyState">
            <div class="abstract-illustration">
                <!-- 正弦浮动折纸层 1 -->
                <svg class="float-layer float-layer-1" viewBox="0 0 180 140">
                    <rect x="50" y="20" width="80" height="100" rx="6" fill="var(--brand-light)" stroke="var(--brand-color)" stroke-width="1.2" />
                    <line x1="65" y1="45" x2="115" y2="45" stroke="var(--brand-color)" stroke-width="1.2" />
                    <line x1="65" y1="65" x2="115" y2="65" stroke="var(--brand-color)" stroke-width="1.2" />
                    <line x1="65" y1="85" x2="95" y2="85" stroke="var(--brand-color)" stroke-width="1.2" />
                </svg>
                <!-- 正弦浮动折纸层 2 (倾斜文档) -->
                <svg class="float-layer float-layer-2" viewBox="0 0 180 140">
                    <rect x="75" y="35" width="60" height="80" rx="4" fill="var(--bg-main)" stroke="var(--text-muted)" stroke-width="1.2" transform="rotate(8, 105, 75)" opacity="0.8"/>
                </svg>
                <!-- 浮动的呼吸圆点 -->
                <svg class="float-layer float-layer-3" viewBox="0 0 180 140">
                    <circle cx="35" cy="50" r="3" fill="var(--brand-color)" opacity="0.6"/>
                    <circle cx="150" cy="90" r="4" fill="var(--brand-color)" opacity="0.4"/>
                    <circle cx="130" cy="30" r="2.5" fill="var(--text-muted)" opacity="0.5"/>
